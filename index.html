<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Management of Financial Services Presentation</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; background: #000; }
        
        /* Two overlapping iframes for the transition */
        .viewer {
            position: absolute;
            border: none;
            display: block;
            transition: opacity 0.2s ease-in-out; /* The "Smooth" part */
            opacity: 0;
            z-index: 1;
        }

        .active { opacity: 1; z-index: 2; }
    </style>
</head>
<body>
    <!-- Two iframes to swap between -->
    <iframe id="iframeA" class="viewer active" scrolling="no"></iframe>
    <iframe id="iframeB" class="viewer" scrolling="no"></iframe>

    <script>
        const pages = [
            'pages/p1.html',
            'pages/p2.html',
            'pages/p3.html',
            'pages/p4.html',
            'pages/p5.html',
            'pages/p6.html',
            'pages/p7.html',
            'pages/p8.html',
            'pages/p9.html',
            'pages/p10.html',
            'pages/p11.html',
            'pages/p12.html',
            'pages/p13.html',
        ]; // List your files here
        let index = 0;
        let activeID = 'iframeA';
        
        const targetWidth = 1280;
        const targetHeight = 720;

        function autoScale(el) {
            const scale = Math.min(window.innerWidth / targetWidth, window.innerHeight / targetHeight);
            el.style.width = `${targetWidth}px`;
            el.style.height = `${targetHeight}px`;
            el.style.transform = `scale(${scale})`;
            el.style.transformOrigin = 'top left';
            el.style.left = `${(window.innerWidth - targetWidth * scale) / 2}px`;
            el.style.top = `${(window.innerHeight - targetHeight * scale) / 2}px`;
        }

        function switchPage(direction) {
            index = (direction === 'next') ? (index + 1) % pages.length : (index - 1 + pages.length) % pages.length;
            
            const nextID = activeID === 'iframeA' ? 'iframeB' : 'iframeA';
            const currentEl = document.getElementById(activeID);
            const nextEl = document.getElementById(nextID);

            // Load the new page in the background iframe
            nextEl.src = pages[index];
            
            // Wait for it to load before showing it to avoid white flashes
            nextEl.onload = () => {
                autoScale(nextEl);
                currentEl.classList.remove('active');
                nextEl.classList.add('active');
                activeID = nextID;
            };
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') switchPage('next');
            else if (e.key === 'ArrowLeft') switchPage('prev');
            else if (e.key.toLowerCase() === 'f') document.documentElement.requestFullscreen();
            else if (e.key === 'Escape' && document.fullscreenElement) document.exitFullscreen();
            e.preventDefault();
        }, true);

        // Resize support
        window.addEventListener('resize', () => {
            autoScale(document.getElementById('iframeA'));
            autoScale(document.getElementById('iframeB'));
        });

        // Initialize first page
        document.getElementById('iframeA').src = pages[0];
        autoScale(document.getElementById('iframeA'));
    </script>
</body>
</html>
